<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VisionAG — NLK Fabric Inventory v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="/styles.css"/>

</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="logo">
    <h2>▪ VisionAG v2</h2>
    <p>NLK Fabric Inventory</p>
  </div>
  <nav>
    <div class="nav-section">Overview</div>
    <div class="nav-item active" data-page="dashboard" data-nav-page="dashboard">
      <span class="nav-icon">📊</span> Dashboard
    </div>
    <div class="nav-item" data-page="sales" data-nav-page="sales">
      <span class="nav-icon">📈</span> Sales Analytics
    </div>

    <div class="nav-section">Inventory</div>
    <div class="nav-item" data-page="inventory" data-nav-page="inventory">
      <span class="nav-icon">📦</span> All Stock
    </div>
    <div class="nav-item" data-page="inv-SILK" data-nav-page="inventory" data-nav-category="SILK">
      <span class="nav-icon">🟣</span> Silk
    </div>
    <div class="nav-item" data-page="inv-LACE" data-nav-page="inventory" data-nav-category="LACE">
      <span class="nav-icon">🔵</span> Lace
    </div>
    <div class="nav-item" data-page="inv-CEMB" data-nav-page="inventory" data-nav-category="CEMB">
      <span class="nav-icon">🟢</span> CEMB
    </div>
    <div class="nav-item" data-page="inv-EMBROIDERY" data-nav-page="inventory" data-nav-category="EMBROIDERY">
      <span class="nav-icon">🟡</span> Embroidery
    </div>

    <div class="nav-section">Business</div>
    <div class="nav-item" data-page="clients" data-nav-page="clients">
      <span class="nav-icon">👥</span> Clients
    </div>
    <div class="nav-item" data-page="invoices" data-nav-page="invoices">
      <span class="nav-icon">🧾</span> Invoices
    </div>

    <div class="nav-section">Tools</div>
    <div class="nav-item" data-page="import" data-nav-page="import">
      <span class="nav-icon">📥</span> Import Excel
    </div>
    <div class="nav-item" data-page="reports" data-nav-page="reports">
      <span class="nav-icon">📋</span> Reports
    </div>
    <div class="nav-item" data-page="pnl" data-nav-page="pnl">
      <span class="nav-icon">📊</span> P&amp;L Statement
    </div>
    <div class="nav-item" id="nav-users" data-page="users" data-nav-page="users" style="display:none">
      <span class="nav-icon">🔐</span> Users
    </div>
  </nav>
  <div class="sidebar-footer" id="sidebar-info">Loading...</div>
</aside>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <h1 id="page-title">Dashboard</h1>
    <div class="topbar-right">
      <div class="curr-toggle" title="Currency display">
        <button class="curr-btn active" id="btn-myr" data-currency="MYR">MYR</button>
        <button class="curr-btn" id="btn-eur" data-currency="EUR">EUR</button>
        <input class="eur-rate" id="eur-rate" type="number" value="4.90" step="0.01" title="EUR rate">
      </div>
      <span class="user-badge" id="user-badge">—</span>
      <button class="btn-logout" id="btn-logout">Sign Out</button>
    </div>
  </div>
  <div id="content"><div class="empty"><div class="empty-icon">⏳</div>Loading...</div></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">—</h3>
      <button class="btn-icon" id="btn-close-modal" style="font-size:18px">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="/app.js" defer></script>

</body>
</html>
